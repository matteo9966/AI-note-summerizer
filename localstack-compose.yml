version: "3.8"
services:
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"       # LocalStack gateway
    environment:
      - SERVICES=s3
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "./localstack-data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"